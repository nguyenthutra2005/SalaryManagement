[phases.setup]
providers = ["csharp"]

[phases.install]
# Lệnh này yêu cầu dotnet restore đúng file project
cmds = ["dotnet restore SalaryManagement.Web/SalaryManagement.Web.csproj"]

[phases.build]
# Lệnh này yêu cầu dotnet publish đúng file project
cmds = ["dotnet publish SalaryManagement.Web/SalaryManagement.Web.csproj -c Release -o /app/out"]

[start]
# Đảm bảo tên file .dll khớp với tên project của bạn
cmd = "dotnet /app/out/SalaryManagement.Web.dll"